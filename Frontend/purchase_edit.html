<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Edytuj zakup - PlsBuyMe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="strona">
  <div class="naglowek">
    <div class="logo-sekcja">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRR5UcGhBEfPDITwfQJhuHlqqM7iaqw5CIlLw&s" class="logo-obraz" alt="logo">
      <div class="logo-tekst">PlsBuyMe</div>
    </div>

    <nav class="menu">
      <a href="main.html" class="menu-link">Strona glowna</a>
      <a href="products_list.html" class="menu-link">Produkty</a>
      <a href="purchases_list.html" class="menu-link">Zakupy</a>
      <a href="users_list.html" class="menu-link">Uzytkownicy</a>
      <a href="admin.html" class="menu-link">Panel admina</a>
    </nav>
  </div>

  <div class="tresc">
    <h1 class="tytul">Edytuj zakup</h1>

    <form class="formularz" id="edit-purchase-form">
      
      <input type="hidden" id="hidden-user-id">
      <input type="hidden" id="hidden-product-id">
      <input type="hidden" id="hidden-date">

      <div class="formularz-grupa">
        <label class="formularz-etykieta" for="id-display">ID zakupu</label>
        <input id="id-display" type="text" class="formularz-pole" disabled>
      </div>

      <div class="formularz-grupa">
        <label class="formularz-etykieta" for="user-display">Uzytkownik</label>
        <input id="user-display" type="text" class="formularz-pole" disabled>
      </div>

      <div class="formularz-grupa">
        <label class="formularz-etykieta" for="product-display">Produkt</label>
        <input id="product-display" type="text" class="formularz-pole" disabled>
      </div>

      <div class="formularz-grupa">
        <label class="formularz-etykieta" for="ilosc">Ilosc</label>
        <input id="ilosc" type="number" min="1" class="formularz-pole" required>
      </div>

      <div class="formularz-grupa">
        <label class="formularz-etykieta" for="status">Status</label>
        <select id="status" class="formularz-pole">
          <option value="Nowe">Nowe</option>
          <option value="W realizacji">W realizacji</option>
          <option value="Wysłane">Wysłane</option>
          <option value="Zrealizowane">Zrealizowane</option>
        </select>
      </div>

      <div class="przyciski">
        <button type="submit" class="przycisk">Zapisz zmiany</button>
        <a href="purchases_list.html" class="przycisk-szary przycisk">Powrot</a>
      </div>
    </form>
  </div>

  <div class="stopka">
    PlsBuyMe
  </div>
</div>
<script src="config.js"></script>
<script src="products.js"></script>
<script src="users.js"></script>
<script src="purchases.js"></script>
</body>
</html>
