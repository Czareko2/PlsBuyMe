<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Edytuj uzytkownika - PlsBuyMe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="strona">
    <div class="naglowek">
        <div class="logo-sekcja">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRR5UcGhBEfPDITwfQJhuHlqqM7iaqw5CIlLw&s" class="logo-obraz" alt="logo">
            <div class="logo-tekst">PlsBuyMe</div>
        </div>

        <nav class="menu">
            <a href="main.html" class="menu-link">Strona glowna</a>
            <a href="products_list.html" class="menu-link">Produkty</a>
            <a href="purchases_list.html" class="menu-link">Zakupy</a>
            <a href="users_list.html" class="menu-link">Uzytkownicy</a>
            <a href="admin.html" class="menu-link">Panel admina</a>
        </nav>
    </div>

    <div class="tresc">
        <h1 class="tytul">Edytuj uzytkownika</h1>

        <form class="formularz" id="edit-user-form">
            
            <input type="hidden" id="user-id-hidden">

            <div class="formularz-grupa">
                <label class="formularz-etykieta" for="id-display">ID</label>
                <input id="id-display" type="text" class="formularz-pole" disabled>
            </div>

            <div class="formularz-grupa">
                <label class="formularz-etykieta" for="login">Login</label>
                <input id="login" type="text" class="formularz-pole">
                <small id="error-login" class="error-msg"></small>
            </div>

            <div class="formularz-grupa">
                <label class="formularz-etykieta" for="email">Email</label>
                <input id="email" type="email" class="formularz-pole">
                <small id="error-email" class="error-msg"></small>
            </div>

            <div class="formularz-grupa">
                <label class="formularz-etykieta" for="haslo">Hasło (wpisz nowe lub stare)</label>
                <input id="haslo" type="text" class="formularz-pole">
                <small id="error-haslo" class="error-msg"></small>
            </div>

            <div class="formularz-grupa">
                <label class="formularz-etykieta" for="rola">Rola</label>
                <select id="rola" class="formularz-pole">
                    <option value="klient">klient</option>
                    <option value="admin">admin</option>
                </select>
            </div>

            <div class="przyciski">
                <button type="submit" class="przycisk">Zapisz zmiany</button>
                <a href="users_list.html" class="przycisk-szary przycisk">Powrot</a>
            </div>
        </form>
    </div>

    <div class="stopka">
        PlsBuyMe
    </div>
</div>
<script src="config.js"></script>
<script src="products.js"></script>
<script src="users.js"></script>
<script src="purchases.js"></script>
</body>
</html>
