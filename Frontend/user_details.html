<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Szczegoly uzytkownika - PlsBuyMe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="strona">
    <div class="naglowek">
        <div class="logo-sekcja">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRR5UcGhBEfPDITwfQJhuHlqqM7iaqw5CIlLw&s" class="logo-obraz" alt="logo">
            <div class="logo-tekst">PlsBuyMe</div>
        </div>

        <nav class="menu">
            <a href="main.html" class="menu-link">Strona glowna</a>
            <a href="products_list.html" class="menu-link">Produkty</a>
            <a href="purchases_list.html" class="menu-link">Zakupy</a>
            <a href="users_list.html" class="menu-link">Uzytkownicy</a>
            <a href="admin.html" class="menu-link">Panel admina</a>
        </nav>
    </div>

    <div class="tresc">
        <h1 class="tytul">Szczegoly uzytkownika</h1>

        <div class="sekcja-podsumowanie" id="user-details-container">
            <div class="kafelek">
                <p><strong>ID:</strong> <span id="view-user-id"></span></p>
                <p><strong>Login:</strong> <span id="view-user-login"></span></p>
                <p><strong>Email:</strong> <span id="view-user-email"></span></p>
                <p><strong>Rola:</strong> <span id="view-user-role"></span></p>
            </div>
        </div>

        <h2 class="kafelek-tytul">Historia zakupów użytkownika</h2>

        <table class="tabela">
            <thead>
            <tr>
                <th>ID zakupu</th>
                <th>Produkt</th>
                <th>Data</th>
                <th>Status</th>
            </tr>
            </thead>
            <tbody id="user-history-body">
                </tbody>
        </table>

        <div class="przyciski">
            <a id="btn-user-edit" href="#" class="przycisk">Edytuj</a>
            <a href="users_list.html" class="przycisk-szary przycisk">Powrot</a>
        </div>
    </div>

    <div class="stopka">
        PlsBuyMe
    </div>
</div>
<script src="config.js"></script>
<script src="products.js"></script>
<script src="users.js"></script>
<script src="purchases.js"></script>
</body>
</html>
