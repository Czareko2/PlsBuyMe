<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Szczegóły produktu - PlsBuyMe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="strona">
  <div class="naglowek">
    <div class="logo-sekcja">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRR5UcGhBEfPDITwfQJhuHlqqM7iaqw5CIlLw&s" class="logo-obraz" alt="logo">
      <div class="logo-tekst">PlsBuyMe</div>
    </div>
    <nav class="menu">
      <a href="main.html" class="menu-link">Strona glowna</a>
      <a href="products_list.html" class="menu-link">Produkty</a>
      <a href="purchases_list.html" class="menu-link">Zakupy</a>
      <a href="users_list.html" class="menu-link">Uzytkownicy</a>
      <a href="admin.html" class="menu-link">Panel admina</a>
    </nav>
  </div>

  <div class="tresc">
    <h1 class="tytul">Szczegóły produktu</h1>

    <div class="sekcja-podsumowanie" id="details-container">
      <div class="kafelek">
        <p><strong>ID:</strong> <span id="view-id"></span></p>
        <p><strong>Nazwa:</strong> <span id="view-name"></span></p>
        <p><strong>Kod:</strong> <span id="view-code"></span></p>
        <p><strong>Cena:</strong> <span id="view-price"></span> PLN</p>
        <p><strong>Rozmiar:</strong> <span id="view-size"></span></p>
        <p><strong>Kolor:</strong> <span id="view-color"></span></p>
        <p><strong>Opis:</strong> <span id="view-desc"></span></p>
      </div>
    </div>
    </div>

    <h3>Historia sprzedaży tego produktu</h3>
    
    <table class="tabela">
        <thead>
            <tr>
                <th>Data</th>
                <th>Kupujący</th>
                <th>Ilość</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="product-history-body">
            </tbody>
    </table>
    <div class="przyciski">
      <a id="btn-edit" href="#" class="przycisk">Edytuj</a>
      <button id="btn-delete" class="przycisk przycisk-usun">Usuń</button>
      
      <a href="products_list.html" class="przycisk-szary przycisk">Powrót</a>
    </div>
  </div>

  <div class="stopka">PlsBuyMe</div>
</div>
<script src="config.js"></script>
<script src="products.js"></script>
<script src="users.js"></script>
<script src="purchases.js"></script>
</body>
</html>
