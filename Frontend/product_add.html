<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Dodaj produkt - PlsBuyMe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="strona">
  <div class="naglowek">
    <div class="logo-sekcja">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRR5UcGhBEfPDITwfQJhuHlqqM7iaqw5CIlLw&s" class="logo-obraz" alt="logo">
      <div class="logo-tekst">PlsBuyMe</div>
    </div>
    <nav class="menu">
      <a href="main.html" class="menu-link">Strona glowna</a>
      <a href="products_list.html" class="menu-link">Produkty</a>
      <a href="purchases_list.html" class="menu-link">Zakupy</a>
      <a href="users_list.html" class="menu-link">Uzytkownicy</a>
      <a href="admin.html" class="menu-link">Panel admina</a>
    </nav>
  </div>

  <div class="tresc">
    <h1 class="tytul">Dodaj produkt</h1>

    <form class="formularz" id="add-product-form">
      
      <div class="formularz-grupa">
        <label class="formularz-etykieta" for="nazwa">Nazwa</label>
        <input id="nazwa" type="text" class="formularz-pole">
        
        <small id="error-nazwa" class="error-msg"></small> 
      </div>

      <div class="formularz-grupa">
        <label class="formularz-etykieta" for="kod">Kod</label>
        <input id="kod" type="text" class="formularz-pole">
      </div>

      <div class="formularz-grupa">
        <label class="formularz-etykieta" for="cena">Cena (PLN)</label>
        <input id="cena" type="number" step="0.01" class="formularz-pole">
        
        <small id="error-cena" class="error-msg"></small>
      </div>

      <div class="formularz-grupa">
        <label class="formularz-etykieta" for="rozmiar">Rozmiar</label>
        <input id="rozmiar" type="text" class="formularz-pole">
      </div>

      <div class="formularz-grupa">
        <label class="formularz-etykieta" for="kolor">Kolor</label>
        <input id="kolor" type="text" class="formularz-pole">
      </div>

      <div class="formularz-grupa">
        <label class="formularz-etykieta" for="opis">Opis</label>
        <textarea id="opis" class="formularz-pole" rows="3"></textarea>
      </div>

      <div class="przyciski">
        <button type="submit" class="przycisk">Zapisz produkt</button>
        <a href="products_list.html" class="przycisk-szary przycisk">Powrot</a>
      </div>
    </form>
  </div>

  <div class="stopka">PlsBuyMe</div>
</div>
<script src="config.js"></script>
<script src="products.js"></script>
<script src="users.js"></script>
<script src="purchases.js"></script>
</body>
</html>
